name: Update standings & deploy

# Runs every morning and on demand.
# GitHub's scheduler is best-effort: it delays/skips jobs under load, and the
# busiest minutes (:00 and :30) are skipped most often. So we use an off-peak
# minute AND a backup run an hour later — if the first is dropped, the second
# catches it. Times are UTC; Norway in summer is UTC+2.
on:
  schedule:
    - cron: "13 5 * * *"    # 07:13 Norwegian summer time
    - cron: "13 6 * * *"    # 08:13 — backup if the 07:13 run was skipped
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main]        # also rebuild whenever you commit new sheets

permissions:
  contents: write           # to commit refreshed data/ and docs/
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # The vmfantasy.tv2.no API is open — no token/secret required.
      - name: Run the morning update
        run: python run_update.py

      - name: Commit refreshed data & site
        run: |
          git config user.name "standings-bot"
          git config user.email "actions@github.com"
          git add data docs
          git commit -m "Update standings [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"

      - uses: actions/configure-pages@v5
        with:
          enablement: true        # self-enable Pages so no manual UI step is needed
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
